<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Sender — Oluwafemi Aisida</title>
  <meta name="description" content="A no-backend email sending app built with EmailJS. Project by Oluwafemi Aisida." />
  <link rel="stylesheet" href="email-sender.css" />
  <link rel="icon" href="../assets/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- EmailJS v4 (correct current CDN) -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init({ publicKey: 'gzvOEAhNIJOR8CMkS' });</script>
</head>
<body>

  <header class="site-header">
    <a href="../projects2.html" class="back-link">← Back to Projects</a>
  </header>

  <main class="app">

    <div class="app-title-block">
      <div class="app-icon">✉️</div>
      <h1>Send an Email</h1>
      <p class="app-subtitle">Powered by EmailJS — no backend needed</p>
    </div>

    <div class="composer">

      <div class="field">
        <label for="toInput">To</label>
        <input type="email" id="toInput" placeholder="recipient@example.com" autocomplete="off" />
      </div>

      <div class="field">
        <label for="subjectInput">Subject</label>
        <input type="text" id="subjectInput" placeholder="What's this about?" />
      </div>

      <div class="field">
        <label for="bodyInput">Message</label>
        <textarea id="bodyInput" rows="7" placeholder="Write your message here…"></textarea>
        <span class="char-count" id="char-count">0 characters</span>
      </div>

      <div class="actions">
        <button id="sendButton" class="btn-send">
          <span class="btn-label">Send</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <p class="status-msg" id="status-msg"></p>
      <p class="spam-note">📬 Sent emails may arrive in your spam folder.</p>

    </div>

  </main>

  <footer class="site-footer">
    <a href="../projects2.html">← All Projects</a>
    <span>© 2026 Oluwafemi Aisida</span>
  </footer>

  <script src="email-sender.js"></script>
</body>
</html>
