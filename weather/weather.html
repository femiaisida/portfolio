<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast — Oluwafemi Aisida</title>
  <link rel="stylesheet" href="weather.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <a href="../projects2.html" class="back-link">← Back to Projects</a>
  </header>

  <main class="app">

    <div class="hero-block">
      <div class="weather-icon" id="weather-icon" aria-hidden="true">🌤️</div>
      <h1 class="app-title">UK Weather</h1>
      <p class="app-subtitle">Tomorrow's forecast for any postcode</p>
    </div>

    <div class="search-card">
      <label for="postcode" class="sr-only">Enter a UK postcode</label>
      <div class="input-row">
        <input type="text" id="postcode" placeholder="e.g. NE1 4ST" maxlength="8" autocomplete="off" />
        <button id="getForecast" class="btn-search">Get Forecast</button>
      </div>
      <p class="input-hint" id="input-hint"></p>
    </div>

    <div class="forecast-grid" id="forecast-grid" hidden>
      <div class="forecast-card wide location-card">
        <span class="fc-label">Location</span>
        <span class="fc-value" id="location-name">—</span>
      </div>
      <div class="forecast-card highlight">
        <span class="fc-label">High</span>
        <span class="fc-value large" id="tempHigh">—</span>
        <span class="fc-unit">°C</span>
      </div>
      <div class="forecast-card highlight">
        <span class="fc-label">Low</span>
        <span class="fc-value large" id="tempLow">—</span>
        <span class="fc-unit">°C</span>
      </div>
      <div class="forecast-card wide">
        <span class="fc-label">Conditions</span>
        <span class="fc-value" id="conditions">—</span>
      </div>
      <div class="forecast-card wide">
        <span class="fc-label">Day</span>
        <span class="fc-value small" id="daySummary">—</span>
      </div>
      <div class="forecast-card wide">
        <span class="fc-label">Night</span>
        <span class="fc-value small" id="nightSummary">—</span>
      </div>
    </div>

    <div class="alert-card" id="alert-section" hidden>
      <p class="alert-title" id="alert-title">⚠️ Extreme weather alert</p>
      <p class="alert-desc" id="alert-desc"></p>
      <div class="email-row">
        <label for="email" class="sr-only">Your email for alert</label>
        <input type="email" id="email" placeholder="your@email.com" />
        <button id="submitEmail" class="btn-alert">Send Alert</button>
      </div>
      <p class="email-status" id="email-status"></p>
    </div>

  </main>

  <footer class="site-footer">
    <a href="../projects2.html">← All Projects</a>
    <span>© 2026 Oluwafemi Aisida</span>
  </footer>

  <script src="https://cdn.emailjs.com/sdk/3.2/email.min.js"></script>
  <script>emailjs.init('gzvOEAhNIJOR8CMkS');</script>
  <script src="weather.js"></script>
</body>
</html>
