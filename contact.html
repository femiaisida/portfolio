  <nav>

  <section class="container">
    <h1>Contact Me</h1>

    <div class="contact-actions">
      <a href="assets/cv.docx" class="btn secondary" download>⬇ Download CV</a>
      <a href="https://github.com/femiaisida" class="btn secondary" target="_blank" rel="noopener">GitHub</a>
    </div>

    <div class="card">
      <form action="https://formspree.io/f/xjkryojg" method="POST">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Jane Smith" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="What would you like to say?" required></textarea>

        <button class="btn primary" type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <div class="footer-links">
      <a href="https://github.com/femiaisida" target="_blank" rel="noopener">GitHub</a>
